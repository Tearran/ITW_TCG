  <title id="title">ITW-A014 Cottontail Rabbit</title>
  <desc id="desc">ITW-A014 Cottontail Rabbit. Common. Bio-Energy (Prey). Cost 0. Provides 1 Prey Bio-Energy per turn. BiomeTag Grassland. ForestTag Tonto National Forest.</desc>

