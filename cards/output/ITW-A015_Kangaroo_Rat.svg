  <text x="632" y="109" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">0</text>

  <g clip-path="url(#imageClip)">
    <rect x="64" y="190" width="622" height="350" fill="url(#kratArtBg)"/>
    <!-- Sandy ground -->
    <path d="M64,482 C180,464 290,474 400,468 C514,462 604,486 686,474 L686,540 L64,540 Z" fill="#9a7830"/>
    <!-- Sand ripples -->
    <path d="M120,490 C158,484 198,490 238,484" fill="none" stroke="#8a6820" stroke-width="2.5" opacity="0.6"/>
    <path d="M380,492 C420,486 468,492 508,486" fill="none" stroke="#8a6820" stroke-width="2.5" opacity="0.6"/>
    <!-- Long tail extending to the left -->
    <path d="M246,434 C206,448 158,450 112,440 C92,434 82,452 92,462 C102,450 110,450 122,456 C152,464 202,462 250,450" fill="none" stroke="#9a6828" stroke-width="10" stroke-linecap="round"/>
    <!-- Tail tuft -->
    <ellipse cx="90" cy="462" rx="18" ry="12" fill="#5a3810" transform="rotate(18 90 462)"/>
