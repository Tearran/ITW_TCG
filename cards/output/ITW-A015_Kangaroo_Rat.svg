    <ellipse cx="508" cy="362" rx="16" ry="10" fill="#b08060"/>
    <!-- Whiskers -->
    <path d="M504,360 L554,348 M504,364 L556,364 M504,368 L552,380" stroke="#8a6040" stroke-width="2.5" stroke-linecap="round"/>
