    <path d="M298,406 C328,428 352,436 378,434 C396,432 414,426 426,418" fill="none" stroke="#dcd0b0" stroke-width="16" stroke-linecap="round"/>
    <!-- Massive back legs -->
    <path d="M316,438 L278,490 L294,504 L316,500 L320,488" stroke="#9a6830" stroke-width="18" stroke-linejoin="round" fill="none" stroke-linecap="round"/>
    <path d="M360,440 L336,494 L354,508 L376,502 L376,490" stroke="#9a6830" stroke-width="18" stroke-linejoin="round" fill="none" stroke-linecap="round"/>
    <!-- Small front paws -->
    <path d="M416,418 L390,448 L402,452" stroke="#9a6830" stroke-width="10" stroke-linecap="round"/>
    <path d="M404,422 L382,450 L394,454" stroke="#9a6830" stroke-width="10" stroke-linecap="round"/>
    <!-- Huge dark eye -->
    <circle cx="434" cy="340" r="22" fill="#101010"/>
    <circle cx="427" cy="334" r="8" fill="#3a2818" opacity="0.6"/>
    <!-- Small ear -->
