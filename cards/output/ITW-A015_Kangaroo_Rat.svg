  <title id="title">ITW-A015 Kangaroo Rat</title>
  <desc id="desc">ITW-A015 Kangaroo Rat. Common. Bio-Energy (Prey). Cost 0. Provides 1 Prey Bio-Energy per turn. BiomeTag Arid Basin. ForestTag Tonto National Forest.</desc>

  <defs>
    <linearGradient id="usfsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2c1f"/>
      <stop offset="60%" stop-color="#162016"/>
      <stop offset="100%" stop-color="#0d140d"/>
    </linearGradient>
    <linearGradient id="usfsCream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#e3ded2"/>
    </linearGradient>
    <linearGradient id="kratArtBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4ba70"/>
      <stop offset="52%" stop-color="#c8a050"/>
      <stop offset="100%" stop-color="#9a7830"/>
    </linearGradient>
    <clipPath id="imageClip">
      <rect x="64" y="190" width="622" height="350" rx="12"/>
    </clipPath>
  </defs>

