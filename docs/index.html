<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>ITW TCG Card Studio</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <main class="app">
  <section class="editor-panel">
    <h1>ITW TCG Card Editor</h1>

    <form id="card-editor-form" novalidate>
      <div class="form-grid">
        <label>
          <span>Card Name</span>
          <input type="text" name="card-name" />
        </label>

        <label>
          <span>Scientific Name</span>
          <input type="text" name="scientific-name" />
        </label>

        <label>
          <span>Type</span>
          <input type="text" name="card-type" />
        </label>

        <label>
          <span>Flora</span>
          <input type="number" name="flora" min="0" step="1" value="0" />
        </label>

        <label>
          <span>Water</span>
          <input type="number" name="water" min="0" step="1" value="0" />
        </label>

        <label>
          <span>Fauna</span>
          <input type="number" name="fauna" min="0" step="1" value="0" />
        </label>

        <label>
          <span>Attack</span>
          <input type="number" name="attack" min="0" step="1" value="0" />
        </label>

        <label>
          <span>Health</span>
          <input type="number" name="health" min="0" step="1" value="0" />
        </label>

        <label class="full-width">
          <span>Fact</span>
          <textarea name="fact" rows="4"></textarea>
        </label>

        <label class="full-width">
          <span>Abilities</span>
          <textarea name="abilities" rows="4"></textarea>
        </label>

        <label>
          <span>Expansion</span>
          <input type="text" name="expansion" />
        </label>

        <label>
          <span>Artist</span>
          <input type="text" name="artist" />
        </label>

        <label class="full-width">
          <span>Artwork Upload (SVG)</span>
          <input type="file" id="artwork-input" accept=".svg,image/svg+xml" />
        </label>
      </div>

      <div class="actions">
        <button type="button" id="import-json-button">Import JSON</button>
        <input type="file" id="import-json-input" accept=".json,application/json" hidden />
        <button type="button" id="save-svg-button">Save SVG</button>
      </div>

      <div class="card-library">
        <label>
          <span>Card Library (<span id="card-count">0</span> cards)</span>
          <select id="saved-cards-select"></select>
        </label>
        <div class="actions">
          <button type="button" id="new-card-button">New Card</button>
          <button type="button" id="save-card-button">Save</button>
          <button type="button" id="duplicate-card-button">Duplicate</button>
          <button type="button" id="remove-card-button">Remove</button>
        </div>
        <div class="actions">
          <button type="button" id="export-deck-button">Export Deck</button>
        </div>
      </div>
    </form>
  </section>

  <section class="preview-panel">
    <h2>Live Preview</h2>
    <div id="svg-preview" class="svg-preview"></div>
  </section>
</main>
